<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kuma Picker Bridge</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header id="connection-status" class="connection-status">
        <div class="connection-badge">
          <span id="connection-dot" class="status-dot status-dot-checking" aria-hidden="true"></span>
          <p id="connection-label" class="connection-label">Checking bridge...</p>
        </div>
        <p id="connection-url" class="connection-url">http://127.0.0.1:4312</p>
      </header>

      <section id="page-status" class="page-status" data-state="checking">
        <span id="page-status-dot" class="status-dot status-dot-checking" aria-hidden="true"></span>
        <div class="page-status-copy">
          <p id="page-status-label" class="page-status-label">Checking current page...</p>
          <p id="page-status-meta" class="page-status-meta"></p>
          <div id="page-status-controls" class="page-status-controls is-hidden">
            <span id="page-tab-id" class="page-tab-id"></span>
            <button
              id="copy-page-tab-id"
              type="button"
              class="icon-button"
              aria-label="Copy current tab ID"
              title="Copy current tab ID"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M9 9.75A2.25 2.25 0 0 1 11.25 7.5h7.5A2.25 2.25 0 0 1 21 9.75v9A2.25 2.25 0 0 1 18.75 21h-7.5A2.25 2.25 0 0 1 9 18.75z"
                />
                <path
                  d="M6.75 16.5A2.25 2.25 0 0 1 4.5 14.25v-9A2.25 2.25 0 0 1 6.75 3h7.5A2.25 2.25 0 0 1 16.5 5.25"
                />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section id="live-capture-status" class="page-status live-capture-status" data-state="idle">
        <span id="live-capture-dot" class="status-dot status-dot-connected" aria-hidden="true"></span>
        <div class="page-status-copy">
          <p id="live-capture-label" class="page-status-label">Live capture idle</p>
          <p id="live-capture-meta" class="page-status-meta">Start from this popup to record the current tab at full frame rate.</p>
          <div class="page-status-controls">
            <button id="start-live-capture" type="button" class="button button-primary">
              Start Live Capture
            </button>
            <button id="stop-live-capture" type="button" class="button button-danger">
              Stop
            </button>
          </div>
        </div>
      </section>

      <section id="connection-form" class="connection-form is-hidden">
        <input
          id="daemon-url"
          type="url"
          spellcheck="false"
          placeholder="http://127.0.0.1:4312"
        />
        <button id="connect-daemon" type="button" class="button button-secondary">
          Connect
        </button>
      </section>

      <section class="action-stack">
        <button id="capture-page" type="button" class="button button-primary">
          Capture Current Page
        </button>
        <button id="inspect-element" type="button" class="button button-secondary">
          Pick Element Or Drag Area
        </button>
        <button id="inspect-with-job" type="button" class="button button-tertiary">
          Pick With Job
        </button>
      </section>

      <p class="micro-copy">Click to pick an element, or drag to capture an area. Press <kbd>Esc</kbd> to cancel.</p>
      <p id="feedback" class="feedback feedback-idle"></p>
      <p id="last-saved" class="last-saved"></p>

      <section class="prompt-panel">
        <div class="prompt-shell">
          <textarea id="refactor-prompt" class="prompt-text" readonly></textarea>
          <button id="copy-refactor-prompt" type="button" class="button button-ghost">
            Copy Refactor Prompt
          </button>
        </div>
      </section>
    </main>
    <script src="./shared/runtime.js"></script>
    <script src="./popup/state.js"></script>
    <script src="./popup/view.js"></script>
    <script src="./popup/main.js"></script>
  </body>
</html>
