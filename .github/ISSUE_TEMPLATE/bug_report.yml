name: Bug report
description: Report a reproducible problem in Kuma Picker
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact steps, commands, pages, and browser state needed to reproduce
      placeholder: |
        1. Start the daemon with ...
        2. Load the unpacked extension ...
        3. Run ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, browser version, daemon URL, and whether the extension was reloaded
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Did `npm test`, smoke, or parity reproduce the issue?
