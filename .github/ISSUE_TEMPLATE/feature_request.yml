name: Feature request
description: Propose an improvement for Kuma Picker
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real workflow pain does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the idea
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note any performance, benchmark, extension, or API constraints

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing commands, docs, or workflows you already tried
